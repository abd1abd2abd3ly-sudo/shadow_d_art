<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowDemonMail - بريد مؤقت حقيقي</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --accent-color: #1d4ed8;
            --accent-hover: #1e40af;
            --text-color: #f3f4f6;
            --muted-text: #9ca3af;
            --border-color: #374151;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 650px;
            padding: 20px;
        }

        /* واجهة بوابة الدخول الثابتة */
        .login-box {
            background-color: var(--card-color);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .login-box h2 {
            margin-top: 0;
            color: #fff;
        }

        input[type="text"], input[type="password"] {
            width: 85%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #0b0b0b;
            color: #fff;
            text-align: center;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        /* واجهة صندوق البريد */
        .dashboard-box {
            display: none;
            background-color: var(--card-color);
            padding: 35px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .logo-area {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .email-bar {
            background-color: #0b0b0b;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-family: monospace;
            margin: 25px 0 15px 0;
            border: 1px solid var(--border-color);
            color: #3b82f6;
            letter-spacing: 0.5px;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: #4b5563;
        }
        .btn-secondary:hover {
            background-color: #374151;
        }

        /* صندوق الوارد */
        .inbox-card {
            background-color: #161616;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            text-align: right;
        }

        .inbox-header {
            background-color: #262626;
            padding: 12px 15px;
            font-weight: bold;
            font-size: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .inbox-body {
            padding: 20px;
            color: var(--text-color);
            font-size: 15px;
        }

        .mail-item {
            background: #1e1e1e;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #333;
            cursor: pointer;
        }
        .mail-item:hover {
            border-color: var(--accent-color);
        }

        .mail-meta {
            font-size: 12px;
            color: var(--muted-text);
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .error-msg {
            color: #ef4444;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="login-box" id="loginBox">
        <h2>تسجيل الدخول للنظام</h2>
        <p style="color: var(--muted-text)">الموقع محمي، يرجى إدخال اسم المستخدم وكلمة المرور</p>
        
        <input type="text" id="usernameInput" placeholder="اسم المستخدم">
        <input type="password" id="passwordInput" placeholder="كلمة المرور">
        <br>
        <button class="btn" style="width: 85%; margin-top: 15px;" onclick="checkCredentials()">دخول</button>
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="dashboard-box" id="dashboardBox">
        <div class="logo-area">📬 shadowdemon</div>
        <p style="color: var(--muted-text); margin-top: 0; font-size: 15px;">بريد مؤقت حقيقي ومستقر لاستقبال الرسائل</p>
        
        <div class="email-bar" id="emailAddress">جاري توليد بريد...</div>
        
        <div class="action-buttons">
            <button class="btn" onclick="generateRealEmail()">توليد إيميل جديد ↻</button>
            <button class="btn btn-secondary" onclick="copyEmail()">نسخ العنوان 📋</button>
        </div>

        <div class="inbox-card">
            <div class="inbox-header">
                <span>علبة الوارد (Inbox)</span>
                <span style="cursor:pointer; color: #3b82f6;" onclick="fetchMessages()">تحديث يدوي ↻</span>
            </div>
            <div class="inbox-body" id="inboxContent">
                بانتظار وصول رسائل جديدة...<br>
                <span style="font-size: 12px; color: #6b7280; display:block; margin-top:5px;">يتم التحديث تلقائياً كل 10 ثوانٍ</span>
            </div>
        </div>
    </div>

</div>

<script>
    const CORRECT_USERNAME = "admin";
    const CORRECT_PASSWORD = "mysecretpassword";

    let currentLogin = "";
    let currentDomain = "";
    let autoRefreshInterval;

    function checkCredentials() {
        const userInput = document.getElementById('usernameInput').value;
        const passInput = document.getElementById('passwordInput').value;
        const error = document.getElementById('errorMsg');
        
        if (userInput === CORRECT_USERNAME && passInput === CORRECT_PASSWORD) {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('dashboardBox').style.display = 'block';
            generateRealEmail();
            
            // بدء التحديث التلقائي للرسائل كل 10 ثوانٍ
            autoRefreshInterval = setInterval(fetchMessages, 10000);
        } else {
            error.innerText = "اسم المستخدم أو كلمة المرور غير صحيحة!";
        }
    }

    // توليد بريد حقيقي عبر سيرفرات الـ API المتاحة
    async function generateRealEmail() {
        document.getElementById('inboxContent').innerHTML = "جاري تصفير الصندوق والتحقق...";
        const domains = ["1secmail.com", "1secmail.org", "1secmail.net"];
        currentDomain = domains[Math.floor(Math.random() * domains.length)];
        
        const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
        currentLogin = '';
        for (let i = 0; i < 8; i++) {
            currentLogin += chars.charAt(Math.floor(Math.random() * chars.length));
        }

        // عرض الإيميل الحقيقي الصالح للاستقبال
        document.getElementById('emailAddress').innerText = `${currentLogin}@${currentDomain}`;
        fetchMessages();
    }

    // جلب الرسائل الحقيقية من الـ API
    async function fetchMessages() {
        if (!currentLogin || !currentDomain) return;
        
        try {
            const response = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${currentLogin}&domain=${currentDomain}`);
            const data = await response.json();
            
            const inboxContent = document.getElementById('inboxContent');
            
            if (data.length === 0) {
                inboxContent.innerHTML = 'لا توجد رسائل حالياً.<br><span style="font-size: 12px; color: #6b7280; display:block; margin-top:5px;">بانتظار الرسائل (تحديث تلقائي)...</span>';
                return;
            }
            
            inboxContent.innerHTML = ""; // مسح النص القديم
            
            // عرض قائمة الرسائل المستلمة
            data.forEach(msg => {
                const mailItem = document.createElement('div');
                mailItem.className = 'mail-item';
                mailItem.innerHTML = `
                    <div class="mail-meta">
                        <span><b>من:</b> ${msg.from}</span>
                        <span>${msg.date}</span>
                    </div>
                    <div style="font-weight: bold; color: #3b82f6;">${msg.subject || '(بدون عنوان)'}</div>
                    <div style="font-size: 13px; color: var(--muted-text); margin-top:5px;" id="body-${msg.id}">اضغط هنا لقراءة محتوى الرسالة...</div>
                `;
                mailItem.onclick = () => readFullMessage(msg.id);
                inboxContent.appendChild(mailItem);
            });

        } catch (err) {
            console.error("خطأ أثناء جلب الرسائل:", err);
        }
    }

    // دالة لقراءة محتوى الرسالة بالكامل عند الضغط عليها
    async function readFullMessage(id) {
        const bodyDiv = document.getElementById(`body-${id}`);
        bodyDiv.innerText = "جاري تحميل محتوى الرسالة...";
        
        try {
            const response = await fetch(`https://www.1secmail.com/api/v1/?action=readMessage&login=${currentLogin}&domain=${currentDomain}&id=${id}`);
            const data = await response.json();
            
            // عرض نص الرسالة أو الـ HTML المرسل
            bodyDiv.innerHTML = `<hr style="border-color:#333; margin:10px 0;"> ${data.textBody || data.htmlBody}`;
        } catch (err) {
            bodyDiv.innerText = "فشل تحميل الرسالة.";
        }
    }

    function copyEmail() {
        const emailText = document.getElementById('emailAddress').innerText;
        navigator.clipboard.writeText(emailText);
        alert("تم نسخ البريد المؤقت الشغال بنجاح!");
    }
</script>

</body>
</html>
