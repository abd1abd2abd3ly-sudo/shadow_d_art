<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowDemonMail - بريد مؤقت</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --accent-color: #1d4ed8;
            --accent-hover: #1e40af;
            --text-color: #f3f4f6;
            --muted-text: #9ca3af;
            --border-color: #374151;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 650px;
            padding: 20px;
        }

        /* واجهة بوابه الدخول الثابتة */
        .login-box {
            background-color: var(--card-color);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .login-box h2 {
            margin-top: 0;
            color: #fff;
        }

        input[type="text"], input[type="password"] {
            width: 85%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #0b0b0b;
            color: #fff;
            text-align: center;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        /* واجهة صندوق البريد (الشغل الصح) */
        .dashboard-box {
            display: none;
            background-color: var(--card-color);
            padding: 35px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .logo-area {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .email-bar {
            background-color: #0b0b0b;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-family: monospace;
            margin: 25px 0 15px 0;
            border: 1px solid var(--border-color);
            color: #3b82f6;
            letter-spacing: 0.5px;
        }

        /* الأزرار بنمط incognitomail */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: #4b5563;
        }
        .btn-secondary:hover {
            background-color: #374151;
        }

        /* صندوق الوارد */
        .inbox-card {
            background-color: #161616;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            text-align: right;
        }

        .inbox-header {
            background-color: #262626;
            padding: 12px 15px;
            font-weight: bold;
            font-size: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .inbox-body {
            padding: 50px 20px;
            text-align: center;
            color: var(--muted-text);
            font-size: 15px;
        }

        .error-msg {
            color: #ef4444;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- 1. واجهة بوابه الدخول الافتراضية -->
    <div class="login-box" id="loginBox">
        <h2>تسجيل الدخول للنظام</h2>
        <p style="color: var(--muted-text)">الموقع محمي، يرجى إدخال اسم المستخدم وكلمة المرور المشفرة داخلياً</p>
        
        <input type="text" id="usernameInput" placeholder="اسم المستخدم">
        <input type="password" id="passwordInput" placeholder="كلمة المرور">
        <br>
        <button class="btn" style="width: 85%; margin-top: 15px;" onclick="checkCredentials()">دخول</button>
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- 2. واجهة الشغل الصح (المحاكاة الكاملة لـ incognitomail) -->
    <div class="dashboard-box" id="dashboardBox">
        <div class="logo-area">
            📬 shadowdemon
        </div>
        <p style="color: var(--muted-text); margin-top: 0; font-size: 15px;">Free Temporary Email - Disposable Temp Mail</p>
        
        <!-- حقل عرض الإيميل التلقائي -->
        <div class="email-bar" id="emailAddress">توليد بريد عشوائي...</div>
        
        <!-- أزرار التحكم والإنشاء -->
        <div class="action-buttons">
            <button class="btn" onclick="generateRandomEmail()">توليد إيميل جديد ↻</button>
            <button class="btn btn-secondary" onclick="copyEmail()">نسخ العنوان 📋</button>
        </div>

        <!-- صندوق الرسائل المحاكي لشكل الصورة المتوقعة -->
        <div class="inbox-card">
            <div class="inbox-header">
                <span>علبة الوارد (Inbox)</span>
                <span style="cursor:pointer; color: #3b82f6;" onclick="refreshInbox()">تحديث ↻</span>
            </div>
            <div class="inbox-body" id="inboxContent">
                Waiting for messages...<br>
                <span style="font-size: 12px; color: #6b7280; display:block; margin-top:5px;">Inbox will be refreshed automatically</span>
            </div>
        </div>
    </div>

</div>

<script>
    // ⬇️ هنا تحدد البيانات الثابتة الخاصة بك داخل المشروع ⬇️
    const CORRECT_USERNAME = "admin";
    const CORRECT_PASSWORD = "mysecretpassword";

    function checkCredentials() {
        const userInput = document.getElementById('usernameInput').value;
        const passInput = document.getElementById('passwordInput').value;
        const error = document.getElementById('errorMsg');
        
        // التحقق الداخلي
        if (userInput === CORRECT_USERNAME && passInput === CORRECT_PASSWORD) {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('dashboardBox').style.display = 'block';
            generateRandomEmail(); // توليد الإيميل فور الدخول لتبدأ اللوحة جاهزة
        } else {
            error.innerText = "اسم المستخدم أو كلمة المرور غير صحيحة! تأكد منها.";
        }
    }

    // دالة توليد إيميل عشوائي ينتهي بنطاقك المخصص
    function generateRandomEmail() {
        const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
        let randomStr = '';
        for (let i = 0; i < 9; i++) {
            randomStr += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        document.getElementById('emailAddress').innerText = randomStr + "@shadowdemonart.lol";
        
        // إعادة تصفير صندوق الوارد عند تغيير الإيميل
        document.getElementById('inboxContent').innerHTML = 'Waiting for messages...<br><span style="font-size: 12px; color: #6b7280; display:block; margin-top:5px;">Inbox will be refreshed automatically</span>';
    }

    // دالة نسخ الإيميل بضغطة زر
    function copyEmail() {
        const emailText = document.getElementById('emailAddress').innerText;
        navigator.clipboard.writeText(emailText);
        alert("تم نسخ البريد المؤقت: " + emailText);
    }

    // دالة تحديث محاكاة الصندوق
    function refreshInbox() {
        alert("يتم فحص خوادم البريد الآن... الصندوق فارغ.");
    }
</script>

</body>
</html>
